<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lễ Dạm Ngõ</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Times New Roman", serif;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  transition: opacity 1.5s;
}

.active {
  opacity: 1;
}

h1 {
  font-size: 70px;
  letter-spacing: 2px;
}

p {
  font-size: 32px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="slide active">
  <h1>Thu Hằng & Văn Ngọc</h1>
</div>

<div class="slide">
  <h1>LỄ DẠM NGÕ</h1>
</div>

<div class="slide">
  <h1>30 Tháng Ba 2026</h1>
  <p>(12/02 năm Bính Ngọ)</p>
</div>

<div class="slide">
  <h1>Welcome</h1>
  <p>💍</p>
</div>

<audio id="music" loop muted>
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

function showSlide() {
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  index = (index + 1) % slides.length;
}

setInterval(showSlide, 4000);

// autoplay fix
window.onload = () => {
  let music = document.getElementById("music");
  music.play().then(() => {
    music.muted = false;
  }).catch(() => {
    document.body.addEventListener("click", () => {
      music.play();
      music.muted = false;
    });
  });
};
</script>

</body>
</html>
